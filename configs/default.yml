# EvalKit Default Configuration
# ================================
# Use ${ENV_VAR} to reference environment variables.
# Use ${ENV_VAR:-default_value} to provide a fallback.

# ── Dataset ──────────────────────────────────────────────────────────────────
# Specify either suite_path (file) or builtin_dataset (built-in name).
# suite_path: ./datasets/reasoning.yml
builtin_dataset: reasoning

# ── Providers ────────────────────────────────────────────────────────────────
providers:
  - name: gpt-4o-mini
    type: openai
    model: gpt-4o-mini
    api_key: ${OPENAI_API_KEY}
    temperature: 0.0
    max_tokens: 2048
    timeout: 60.0

  # Uncomment to add Anthropic:
  # - name: claude-3-haiku
  #   type: anthropic
  #   model: claude-3-haiku-20240307
  #   api_key: ${ANTHROPIC_API_KEY}
  #   temperature: 0.0
  #   max_tokens: 2048

  # Uncomment to use an OpenAI-compatible local server (e.g., Ollama):
  # - name: llama3-local
  #   type: openai
  #   model: llama3
  #   api_key: ollama
  #   base_url: http://localhost:11434/v1
  #   temperature: 0.0
  #   max_tokens: 2048

# ── Scorers ───────────────────────────────────────────────────────────────────
scorers:
  - type: exact_match
    weight: 0.4

  - type: contains
    weight: 0.3

  - type: similarity
    weight: 0.3
    params:
      use_tfidf_fallback: true

  # Uncomment to use LLM-as-judge (requires a provider with an API key):
  # - type: llm_judge
  #   weight: 0.5
  #   params:
  #     include_expected: true

# ── Runner ────────────────────────────────────────────────────────────────────
runner:
  concurrency: 5
  timeout_seconds: 60.0
  max_retries: 2
  show_progress: true

# ── Storage ───────────────────────────────────────────────────────────────────
storage:
  backend: json
  path: ${EVALKIT_STORAGE_PATH:-./evalkit_storage}

# ── Output ────────────────────────────────────────────────────────────────────
output_dir: ${EVALKIT_OUTPUT_DIR:-./evalkit_output}
report_format: markdown

# ── Tag Filter ────────────────────────────────────────────────────────────────
# Uncomment to restrict evaluation to cases with specific tags:
# tags:
#   - logic
#   - math
