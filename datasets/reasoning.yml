name: reasoning
description: Logic and reasoning evaluation suite covering deductive reasoning, mathematical cognition, and lateral thinking.
version: "1.0"
scorers:
  - exact_match
  - contains
cases:
  - id: reason_01
    prompt: "If all roses are flowers and some flowers fade quickly, can we conclude that some roses fade quickly?"
    expected: "No, we cannot conclude that. The fact that some flowers fade quickly does not necessarily apply to roses specifically."
    tags: [logic, syllogism, deductive]
    metadata:
      difficulty: medium
      category: deductive_reasoning

  - id: reason_02
    prompt: "A bat and a ball cost $1.10 in total. The bat costs $1.00 more than the ball. How much does the ball cost?"
    expected: "$0.05"
    tags: [math, cognitive-bias, arithmetic]
    metadata:
      difficulty: medium
      category: mathematical_cognition

  - id: reason_03
    prompt: "If it takes 5 machines 5 minutes to make 5 widgets, how long would it take 100 machines to make 100 widgets?"
    expected: "5 minutes"
    tags: [math, proportional-reasoning]
    metadata:
      difficulty: medium
      category: proportional_reasoning

  - id: reason_04
    prompt: "In a lake, there is a patch of lily pads. Every day, the patch doubles in size. If it takes 48 days for the patch to cover the entire lake, how long would it take for the patch to cover half of the lake?"
    expected: "47 days"
    tags: [math, exponential, cognitive-bias]
    metadata:
      difficulty: hard
      category: exponential_reasoning

  - id: reason_05
    prompt: "A doctor gives you three pills and tells you to take one every half hour. How many minutes will it take for all three pills to be taken?"
    expected: "60 minutes"
    tags: [logic, word-problem]
    metadata:
      difficulty: easy
      category: logic

  - id: reason_06
    prompt: "You are in a race and you overtake the person in second place. What position are you now in?"
    expected: "Second place"
    tags: [logic, lateral-thinking]
    metadata:
      difficulty: easy
      category: lateral_thinking

  - id: reason_07
    prompt: "A farmer has 17 sheep. All but 9 die. How many sheep does he have left?"
    expected: "9 sheep"
    tags: [math, language, trick]
    metadata:
      difficulty: easy
      category: language_and_logic

  - id: reason_08
    prompt: "Is the following argument valid? 'All mammals are animals. All dogs are mammals. Therefore, all dogs are animals.'"
    expected: "Yes, the argument is valid. It is a valid syllogism following the structure: All A are B, All C are A, therefore All C are B."
    tags: [logic, syllogism, validity]
    metadata:
      difficulty: easy
      category: argument_analysis

  - id: reason_09
    prompt: "Is the following argument valid? 'All birds can fly. Penguins are birds. Therefore, penguins can fly.'"
    expected: "The argument is logically valid (the conclusion follows from the premises) but unsound because the first premise is false — not all birds can fly."
    tags: [logic, soundness, validity]
    metadata:
      difficulty: medium
      category: argument_analysis

  - id: reason_10
    prompt: "Tom is taller than Sam. Sam is taller than Mike. Who is the shortest?"
    expected: "Mike"
    tags: [logic, transitive, ordering]
    metadata:
      difficulty: easy
      category: transitive_reasoning

  - id: reason_11
    prompt: "If you have a 3-liter jug and a 5-liter jug and an unlimited supply of water, how can you measure exactly 4 liters?"
    expected: "Fill the 5-liter jug, pour into the 3-liter until full (leaving 2 liters in the 5-liter jug), empty the 3-liter jug, pour the 2 liters from the 5-liter jug into the 3-liter jug, then fill the 5-liter jug again and pour 1 liter into the 3-liter jug (which already has 2 liters). The 5-liter jug now has 4 liters."
    tags: [logic, puzzle, water-jug]
    metadata:
      difficulty: hard
      category: puzzle

  - id: reason_12
    prompt: "What comes next in the sequence: 2, 4, 8, 16, 32, ___?"
    expected: "64"
    tags: [math, pattern-recognition, sequences]
    metadata:
      difficulty: easy
      category: pattern_recognition

  - id: reason_13
    prompt: "What comes next in the sequence: 1, 1, 2, 3, 5, 8, 13, ___?"
    expected: "21"
    tags: [math, fibonacci, sequences]
    metadata:
      difficulty: easy
      category: pattern_recognition

  - id: reason_14
    prompt: "If the day before yesterday was Thursday, what day will it be the day after tomorrow?"
    expected: "Monday"
    tags: [logic, temporal, days-of-week]
    metadata:
      difficulty: medium
      category: temporal_reasoning

  - id: reason_15
    prompt: "A store reduced the price of a product by 20%, then increased the new price by 20%. Is the final price higher, lower, or the same as the original price?"
    expected: "Lower. The final price is 96% of the original price. If the original is $100: after 20% reduction it is $80, after 20% increase on $80 it is $96, which is 4% lower than the original $100."
    tags: [math, percentages, cognitive-bias]
    metadata:
      difficulty: medium
      category: mathematical_cognition

  - id: reason_16
    prompt: "You flip a fair coin and get heads five times in a row. What is the probability of getting heads on the sixth flip?"
    expected: "50% or 0.5. Each coin flip is an independent event; previous outcomes do not affect the probability of future flips."
    tags: [probability, cognitive-bias, statistics]
    metadata:
      difficulty: medium
      category: probability

  - id: reason_17
    prompt: "Three boxes contain fruit. Box A is labeled 'Apples', Box B is labeled 'Oranges', and Box C is labeled 'Apples and Oranges'. All labels are wrong. You may pick one fruit from one box. Which box should you pick from to correctly label all boxes?"
    expected: "Pick from Box C (labeled 'Apples and Oranges'). Since all labels are wrong, Box C contains either only apples or only oranges. If you pick an apple, Box C is 'Apples', Box A (labeled Apples, but wrong) must be 'Apples and Oranges' (since Box B is already oranges), and Box B is 'Oranges'."
    tags: [logic, puzzle, deductive]
    metadata:
      difficulty: hard
      category: deductive_reasoning

  - id: reason_18
    prompt: "A train leaves Station A at 60 mph heading to Station B, 120 miles away. At the same time, another train leaves Station B heading to Station A at 40 mph. When they meet, how far from Station A are they?"
    expected: "72 miles from Station A. The trains approach each other at 100 mph combined. They meet after 120/100 = 1.2 hours. Train A travels 60 * 1.2 = 72 miles."
    tags: [math, kinematics, word-problem]
    metadata:
      difficulty: hard
      category: mathematical_cognition

  - id: reason_19
    prompt: "Is 'This statement is false.' a true or false statement? Explain."
    expected: "This is the Liar Paradox. If the statement is true, then it must be false (as it claims). If it is false, then it must be true. It is a self-referential statement that cannot consistently be assigned a truth value in classical logic; it leads to a logical paradox."
    tags: [logic, paradox, self-reference]
    metadata:
      difficulty: hard
      category: paradox

  - id: reason_20
    prompt: "You have 12 balls, all identical in appearance. One ball is either heavier or lighter than the others. Using a balance scale with only 3 weighings, how can you identify the odd ball and determine whether it is heavier or lighter?"
    expected: "Divide the 12 balls into three groups of 4. First weighing: weigh Group 1 vs Group 2. If balanced, the odd ball is in Group 3. If unbalanced, the odd ball is in one of those two groups. Subsequent weighings narrow down further by splitting groups and comparing, tracking which side was heavy or light. This classic puzzle can always be solved in 3 weighings using an optimal strategy."
    tags: [logic, puzzle, balance, combinatorics]
    metadata:
      difficulty: hard
      category: puzzle
